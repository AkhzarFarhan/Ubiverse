<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ubiverse — your personal all-in-one dashboard" />
  <title>Ubiverse</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Login Screen ─────────────────────────────────────────── -->
<div id="login-screen">
  <div class="login-card">
    <h2>
      <svg viewBox="0 0 24 24" width="28" height="28" stroke="var(--color-primary)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:bottom; margin-right:4px;">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
      </svg>
      Ubiverse
    </h2>
    <div id="login-alert"></div>
    <button id="google-signin-btn" class="btn btn-google btn-full btn-lg">
      <svg viewBox="0 0 48 48" width="20" height="20" style="vertical-align:middle;margin-right:.5rem">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.25 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 0 1 0-9.18l-7.98-6.19a24.08 24.08 0 0 0 0 21.56l7.98-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.74-13.47-9.21l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Sign in with Google
    </button>
  </div>
</div>

<!-- ── App Shell ─────────────────────────────────────────────── -->
<div id="layout" class="hidden">

  <header id="header">
    <button id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <h1>
      <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:text-bottom; margin-right:4px;">
        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
        <polyline points="2 17 12 22 22 17"></polyline>
        <polyline points="2 12 12 17 22 12"></polyline>
      </svg>
      Ubiverse
    </h1>
    <span id="header-user"></span>
    <button id="signout-btn" class="btn btn-secondary btn-sm hidden">Sign Out</button>
  </header>

  <div id="sidebar-overlay"></div>

  <aside id="sidebar" role="navigation" aria-label="Main navigation">
    <nav>
      <a href="#home"   class="nav-link" data-page="home">
        <span class="nav-icon">🏠</span> Home
      </a>
      <a href="#daily"  class="nav-link" data-page="daily">
        <span class="nav-icon">📅</span> Daily
      </a>
      <a href="#gym"    class="nav-link" data-page="gym">
        <span class="nav-icon">🏋️</span> Gym
      </a>
      <a href="#texter" class="nav-link" data-page="texter">
        <span class="nav-icon">✏️</span> Texter
      </a>
      <a href="#tasbih" class="nav-link" data-page="tasbih">
        <span class="nav-icon">📿</span> Tasbih
      </a>
      <a href="#salah"  class="nav-link" data-page="salah">
        <span class="nav-icon">🕌</span> Salah
      </a>
      <a href="#ledger" class="nav-link" data-page="ledger">
        <span class="nav-icon">💰</span> Ledger
      </a>
      <a href="#car"    class="nav-link" data-page="car">
        <span class="nav-icon">🚗</span> Car
      </a>
    </nav>
  </aside>

  <main id="main">
    <div id="app"></div>
  </main>

</div>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase SDK (compat version) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

<!-- Environment config (generated at deploy time; see js/env.js.example) -->
<script src="js/env.js"></script>

<!-- App scripts — order matters -->
<script src="js/firebase.js"></script>
<script src="js/utils.js"></script>
<script src="js/daily.js"></script>
<script src="js/gym.js"></script>
<script src="js/texter.js"></script>
<script src="js/tasbih.js"></script>
<script src="js/salah.js"></script>
<script src="js/ledger.js"></script>
<script src="js/car.js"></script>
<script src="js/app.js"></script>

</body>
</html>
